body:
  text: 瑞應山沙門運敞述三劫義第一夫真言祕密教者三摩地法為宗即身成佛為要龍猛菩薩菩提心論云惟真言法中即身成佛故是説三摩地法於諸教中闕而不書三摩地法者謂三密瑜伽五相觀門故論云凡修習瑜伽觀行人當須具修三密行證悟五相成身義也所言三密者一身密者如結契印召請聖衆是也二語密者如密誦真言令文句了了分明無謬誤也三意密者如住瑜伽相應白淨月圓滿觀菩提心也次明五相成身者一是通達心二是菩提心三是金剛心四是金剛身五是證無上菩提獲金剛堅固身也然此五相具僃方成本尊身也其圓明則暜賢身也亦是暜賢心也與十方諸佛同之亦乃三世修行證有前後及達悟已無厺來今乃至如金剛頂瑜伽經説一切義成就菩薩初坐金剛座取證無上道遂蒙諸佛授此心地然能證果凡今之人若心決定如教修行不起于座三摩地現前應於是成就本尊之身凡餘教中説經三大阿僧祇劫成佛然此經中立三劫門者所以顯一生頓成之旨也此義云何謂劫有二義一者時分時分者謂三大僧祇餘教所歷之時劫也二者𡚶執𡚶執者謂初劫粗𡚶執第二劫細𡚶執第三劫極細𡚶執餘教經三大阿僧祇時劫所斷三𡚶執真言行者一生超越至初地淨菩提心故立三劫門顯行位也故無畏三藏曰越世間三𡚶執出世間心生者若以淨菩提心為出世間心即是超越三劫瑜祇行梵云劫跛有二義一者時分二者𡚶執若依常途解釋度三阿僧祇劫得成正覺若祕密釋超一劫瑜祇行即是度百六十心等一重粗𡚶執名一阿僧祇劫超二劫瑜祇行又度百六十心等一重細𡚶執名二阿僧祇劫真言門行者復越一劫更度百六十心等一重極細𡚶執得至佛慧初心故云三阿僧祇劫成佛也若一生度此三𡚶執即一生成佛何論時分耶此中佛慧初心者謂淨菩提心淨菩提心者即初地也問諸教通義入劫以後經十信三賢而至初地為初僧祇自第二地至第七地為第二僧祇自第八地至第十地為第三僧祇今云越三劫至初地者違於諸教通義如何答密教十地永異常途説故大師曰歡喜地者非顯教所言初地是則自家佛乘之初地由此義也密教地前不立信賢行位未至初地時名生𣦸所植善若有地前立位之説者準常途也真言行者初發心時入三昧耶修三密供養次第乃度三重𡚶執得至虛空無垢菩提心是名初地也問今經十地名信解地古來一傳曰信謂十信解行謂三賢十地攝十信三賢功德故名信解此義為是否答不應道理且不見本説盍胸臆解矣不可採用無據之説疏有委釋云此經宗從淨菩提心以上十住地皆是信解中行唯如來名究竟一切智地如華嚴中初地菩薩能信如來本行所入信成就諸波羅蜜信入諸勝地信成就力信具足無所畏信生長不可壞不共佛法信不思議佛法信出生無中邊佛境界信隨入如來無量境界信成就果於如是諸事其心畢竟不可破壞不復隨他緣轉故名信解行地亦名到於修行地也信解名義解釋分明豈指信賢耶演密四云言信解中行者信謂忍可樂欲解謂了悟證達各有淺深淺即地前深即地上此是地上行即進修故下第三疏曰復當思惟幻喻如藥物和合而得升空住壽亦非利根智慧所能思議但令妙解其術無不成者以此深心淨信離疑惑故漸得法驗現前復由法驗現前故信解轉增不可殂壞又釋論云譬如穿井已見溼泥轉加精進必望得水又如鑽火已得見𤎆倍復勵力必望得火故曰信解中行也問如云若一生度此三𡚶執即一生成佛者以至初地稱一生成佛此是為顯初地即極義耶答初地即極者內證深旨別途法門然經疏所明專依次第證故疏所言一生成佛者若一生度此三𡚶執得至佛慧初心已至佛慧初心者進心不息勇健修行不起于座而至究竟大牟尼位故云一生成佛如經云所謂初發心乃至十地次第此生滿足緣業生增長有情類業壽種除復有芽種生起一生越三𡚶及究竟十地者可見矣問經説相似十地滿後業壽種除芽種生起如何答不然緣業生等者三𡚶分齊謂除此種子生初地智故云芽種生起也疏云緣業生者謂為有情癡愛因緣造身口意種種虛𡚶不清淨業乘如是業生六趣身增長輪回僃受諸苦今修平等三業清淨慧門一切蘊阿賴耶業壽種子皆悉焚滅得至虛空無垢大菩提心一切如來平等種子從悲藏中生法性牙乃至莖葉花果遍滿諸法界成萬德開敷菩提樹王然以四不生義觀之都無所起亦無起處當知此生即是大空生也故云有情類業壽種除復有牙種生起由此應知業壽種除然後至初地也十住心義第二盍惟衆生自心品即是一切智智與十方三世一切諸佛無有纖毫而不自了知故名凡夫若如實知名為一切智者若有衆生依真言教生一念淨信習三摩地法方便修行進心不息頓越三𡚶至淨菩提心於其中間以無所住而住其心心所住處略有十種故寄齊十種世出世間諸教顯菩提心續生次第故十住心論云經祕密主問發趣菩提之時心所住處相續次第幾種佛具答之故經初品名曰住心今依此經顯真言行者住心次第顯密二教別亦在此中住心雖無量且舉十綱攝之衆毛第一異生羝羊心者從無始來醉無明酒無有醒期溺生𣦸泥不求出離不信因果不辨罪福心之名也如是凡夫隨欲造業受異類生故名異生愚癡昧劣猶如羝羊故以目之然所以為一種住心者高原陸地不生蓮花卑溼淤泥乃生此花菩提心生亦復如是煩惱淤泥生斯牙種是故應知異生羝羊心生一切智心牙種之淤泥也經云無始生𣦸愚童凡夫執著我名我有分別無量我分祕密主若彼不觀我之自性則我我所生等疏釋此文云欲明淨心最初生起之由故先説愚童凡夫違理之心第二愚童持齋心者物無定性遇緣則遷如芽種蒙潤果實得結本覺內熏佛光外射欻爾節食施捨資財心之名也如經中説云愚童凡夫或時有一法想生所謂持齋彼思惟此少分發起歡喜數數修習祕密主是初種子善業發生復以此為因於六齋日施與父母男女親戚是第二牙種乃至復以此施發親愛心而供養尊宿等是第六成果疏云次明最初順理之心順即是世間八心也世間從久遠來展轉相承有善法之名然以違理之心種種推求而不能得後時欻然自有念生我今節食持齋即是善法然猶未是佛法中八關戒也彼由節食自戒故即覺緣務減少令我飲食易足不生馳求勞苦爾時即生少分不著之心其心歡喜而得安穩由見此利益故數數有修習之即是最初微識善惡因果故名種子心也經云復以此為因於六齋日施與父母男女親戚是第二牙種者此六齋日即是智度中上代五通仙人勸令此日斷食既順善法又免鬼神災橫如彼廣説也由見止息貪求內獲利樂故欲修習此法令得增長故於持齋之日捨己財物以與六親自念我無守護之憂而令他人愛敬獲孝義之譽以見此因果故轉生歡喜生歡喜故善心稍增由如從種子生牙也又此心乃習行五常鑽仰十善人趣善心之萌兆凡夫歸源之權輿也第三嬰童無畏心者彼凡夫外道塵視人界欣求天上心之名也亦名天乘雖云上生非想下住仙宮身量高大住壽長遠福報超輪王而未聞佛法較彼賢聖劣弱愚昧似彼嬰孩脫小分苦厄故名無畏經云祕密主彼護戒生天是第七受用種子乃至供養大天隨順修行祕密主是名愚童異生生𣦸流轉無畏依第八嬰童心疏解云已能造齋施見其利益即知三業不善皆是衰惱因緣我當捨之護戒而住由護戒故現世獲諸善利有大名聞身心安樂倍復增廣賢善命終而得生天譬如種果已成受用其實故曰受用種子也又云從一種子成百千果實是一一果實復生若干展轉滋育不可勝數今此受用果心復成後心種子亦復如是故曰受用種子也又釋第八無畏依云又如行者於第八心求生𣦸無畏依時若遇善知識為説三寶真歸依處由彼漸識現世因果故即能信受以上三種名世間心在三劫前第四唯蘊無我心者此心及次下拔業因種心合論初劫此心喻羊車即聲聞乘也大師釋此住心大綱云其為教也三藏廣張四諦暜觀三十七品為道助四向四果即人位言識唯六無七八告成三生六十劫防非則二百五十修善即四念八背半月説罪持犯立顯一夏隨意凡聖乍別禿頭割衣鐵杖鋼盂遂乃厭五蘊之泡露惡三塗之塗炭欣等持之清涼尚身智之灰滅廓同太虛湛然無為何其樂乎乘之為趣大體如此存法故唯蘊遮人故無我簡持為義故唯經云謂如是解唯蘊無我根境界淹留修行第五拔業因種心者此心喻鹿車即緣覺乘也大師釋此心大意云麟角之所證部行之所行觀因緣於十二猒生𣦸乎四五見彼華葉覺四相之無常住此林落證三昧於無言業惱株杌猶此而拔無明種子因之而斷遊泳湛寂之潭優遊無為之宮自然尸羅無授而具無師智慧自我而獲三十七品不由他悟蘊處界善不待藍色身通度人不用言語大悲闕無方便不具但自盡苦證得寂滅故經云拔業煩惱株杌無明種子生十二因緣以上二種是小乘教也第六他緣大乘心者此心及次覺心不生心合論第二劫此心乃是臨門三車中之牛車即法相大乘也大師釋此心大旨略云有大士法樹號他緣乘越建爪而高升超聲緣而廣運二空三性洗自執塵四量四攝齊他利行思惟陀那深細專注幻焰似心勝義勝義致太平之化廢詮談旨扇無事之風拱一真之臺無為法界之殿三大僧祇之庸於是稱帝四智法王之號本無今得言乘即三談識唯八五性有成不三身即常滅百億應化同泛六舟千葉牟尼等授三駕緣法界有情故他緣簡聲獨羊鹿故大名運自他乎圓性故曰乘此乃君子之行業菩薩之用心此北宗大綱盍如此乎經云祕密主大乘行發無緣乘心法無我性何以故如彼往昔如是修行者觀察蘊阿賴耶知自性如幻陽焰影響旋火輪乾闥婆城第七覺心不生心者亦是門外三車中牛車三論性宗也大師釋云夫太虛寥廓含萬象越氣字書古本切又思二切説文上下通也引而上行讀若囟引而下行讀若退故古來相傳為退音讀之盍象形矣謂字形象混元氣貫通天地詳猶云一氣也巨壑泓澄孕千品爰一水誠知一為百千之母空即假有之根假有非有而有有森羅絶空非空而空空不住色不異空建諸法而宛然空空不異色泯諸相而宛然有是故色即是空空即是色諸法亦爾何物不然似水波之不離同金莊之不異不一不二之號立二諦四中之稱顯觀空性於無得越戲論於八不生𣦸即涅槃更無階級煩惱即菩提莫勞斷證雖然無階之階級不壞五十二位階級之無階不礙一念成覺一念之念經三大而勤自行一道之乘馳三駕而勞化他悲唯蘊之迷無性歎他緣之阻境智心王自在得本淨之水心數客塵息動濁之波悟心性之不生知境智之不異斯乃南宗之綱領也故大日尊告祕密主言祕密主彼如是捨無我心主自在覺自心本不生何以故祕密主心前後際不可得故又云謂本不生者兼明不生不滅不斷不常不一不異不厺不來等三論家舉此八不以為究極中道故吉藏法師二諦方言佛性等章盛談此義以上二心名菩薩乘亦云權教亦稱三乘教第八一道無為心者以下三住心合論第三劫此心亦名如實知自心亦名空性無境心即法華一乘也天台止觀云何為一一實不虛故一道清淨故一切無礙之人一道出生𣦸故所以名一道無為心也今經一云云何菩提謂如實知自心所以號如實知自心也又云所謂空性離於根境無相無境界等所以目空性無境心也大師釋此心云寂光如來融境智而知見心性應化諸尊顧行願而分身隨相寂而能照照而常寂似澄水之能鑒如瑩金之影像溼金即照影照影即金水即知境即般若般若即境故云無境界即此如實知自心名為菩提故大日尊告祕密主云祕密主云何菩提謂如實知自心祕密主是阿耨多羅三藐三菩提乃至彼法少分無有可得何以故虛空相是菩提無知解者亦無開曉何以故菩提無相故祕密主如來應正等覺非青非黃非赤非白乃至祕密主云何知自心謂若分段或顯色或形色或境界若色若受想行識若我若我所若能執若所執若清淨若界若處乃至一切分段中求不可得祕密主此菩薩淨菩提心門名初法明道釋曰謂無相虛空相及非青非黃等言並是明法身真如一道無為之真理佛説此名初法明道智度名入佛道初門言佛道者指金剛界宮大日曼荼羅佛於諸顯教是究竟理智法身望真言門是則初門大日世尊及龍猛菩薩並皆明説不須疑惑又下文云所謂空性離於根境無相無境界越諸戲論等同虛空離有為無為界離諸造作離眼耳鼻舌身意者亦是明理法身無畏三藏説行者住此心時即知釋迦牟尼淨土不毀見佛壽量長遠本地之身與上行等從地涌出諸菩薩同會一處修對治道者雖迹鄰補處然不識一人是故此事名祕密證此理佛亦名常寂光土毗盧遮那大隋天台山國清寺智者禪師依此門修止觀得法華三昧即以法華中論智度為所依構一家義此乘之趣大底如此因此世呼名天台宗第九極無自性心者即華嚴一乘也大師釋此心梗概云近而難見我心細而遍空我佛我佛難思議我心廣亦大巧藝心迷擲算離律眼盲休見禹名舌斷夸步足刖聲緣識不識薩埵智不知奇哉之奇絶中之絶其只自心之佛歟迷自心故六道之波鼓動悟心原故一大之水澄淨澄淨之水影落萬像一心之佛鑒知諸法衆生迷此理輪轉不能絶蒼生太狂醉自心不能覺大覺慈父指其歸路歸路五百由旬此心則都亭都亭非常舍隨緣忽遷移遷移無定處是故無自性諸法無自性故厺卑取尊故有真如受熏之極唱勝義無性之祕告警一道於彈指覺無為於未極等空之心於是始起寂滅之果果還為因是因是心望前顯教極果於後祕心初心初發心時便成正覺宜其然也初心之佛其德不思議萬德始顯一心稍現證此心時知三種世間即我身覺十箇量等亦我心盧舍那佛始成道時第二七日與普賢等諸大菩薩等廣談此義是即所謂華嚴經也一行行一切一斷斷一切雖云初心成覺十信道圓因果不異經五位而馳車相性不殊渾十身而同歸斯則華嚴三昧之人意故大日如來告祕密主言所謂空性離於根境無相無境界越諸戲論等同虛空離有為無為界離諸造作離眼耳鼻舌身意極無自性心生善無畏三藏説此極無自性心一句悉攝華嚴教盡所以者何華嚴大意原始要終明真如法界不守自性隨緣之義杜順和上依此法門造五教華嚴三昧法界觀等弟子智儼相續智儼弟子法藏法師又廣五教作旨歸綱目及疏即此華嚴宗之法門一一義章第十祕密莊嚴心者即真言教也鑰首有頌云九種住心無自性轉深轉妙皆是因真言密教法身説祕密金剛最勝真長行首云經云復次祕密主真言門修行菩薩行諸菩薩無量無數百千俱胝那庾多劫積集無量功德智慧具修諸行無量智慧方便皆悉成就解云此歎初入真言菩薩功德次廣引經及菩提心論等明三摩地大意訖重釋初頌云九種住心無自性轉深轉妙皆是因者此二句遮前所説九種心皆非至極佛果言九種者異生羝羊心乃至極無自性心是也就中初一舉凡夫一向行惡行不修微少善次一顯人乘次一表天乘即是外道下厭下界上欣生天願樂解脫遂墮地獄已上三心皆是世間心未名出世第四唯蘊已後名得聖果出世心中唯蘊拔業是小乘教他緣以後大乘心大乘前二菩薩乘後二佛乘如此乘乘自乘得佛名望後作戲論前前皆不住故名無自性後後悉不果故皆是因轉轉相望各各深妙所以深妙真言密教法身説者此一句顯真言教主極無自性以下七教皆是他受用應化佛所説真言密教兩部祕藏是法身大毗盧遮那如來與自眷屬四種法身住金剛法界宮及真言宮殿等自受法樂故所演説十八會指歸等其文分明不更引誠證祕密金剛最勝真者此一句示真言乘教超於諸乘究竟真實也住心因由義第三附顯密寄齊義今此經説如上諸住心有四因由一由佛答金剛手問發趣菩提有幾次第故説諸住心二由欲寄顯惑品粗細修證深淺故説諸住心三由欲令了知餘乘非究竟説故説諸住心四由欲顯示顯乘極果任運流入淨菩提心海故説諸住心一由佛答金剛手問發趣菩提有幾次第者十住心論云祕密主問發趣菩提之時心所住處相續次第幾種佛具答之故經初品名曰住心今依此經顯真言行者住心次第顯密二教別亦在此中住心雖無量且舉十綱攝之衆毛二由寄顯惑品粗細修證深淺者經所説住心明未來流布世出世間大小權實諸乘寄顯真言行者心所住處是名心相文説餘乘名所寄齊義顯密心相目能寄齊故疏三云所以廣明三劫六無畏處衆多心相者皆是擬儀外迹以明修證之深淺耳此中外迹者謂心相也問經疏中不見能所寄齊名目所出何處答雖無名言其義具存是故先達從義立目三劫六無畏説諸住心者皆是也特於六無畏疏雙明能所寄齊者如掌中視珠六無畏中第一無畏當愚童持齋嬰童無畏二種住心而疏釋第一無畏云佛言祕密主彼愚童凡夫修諸善法害不善法當得善無畏者善義通於淺深今此中意明十善業道如世人以十不善道因緣漂沈惡趣無有窮已後得順世八心漸受三歸戒於無量世生人天中後至涅槃以免離三塗劇苦名最初穌息處也若真言行者初入三昧耶依三密供養修行位與此齊等也由此應知真言行者雖未除一毫惑有漏𡚶心中亦有初後淺深次第也第二身無畏當聲聞賢位七方便修四念處觀時疏釋之云經云若如實知我當得身無畏者如修循身觀時見此身三十六物之所集成五種不淨惡露充滿終不為此而生貪愛次復觀受心法得離不觀我性四種顛倒於身諸扼縛得穌息處若真言行者本尊三昧衆相現前時位與此齊也修四念處觀時心相與真言行者於瑜伽中本尊海會現前時心相分位齊也又釋第三無我無畏云經云若於取蘊所集我身捨自色像觀當得無我無畏者謂觀唯蘊無我時於陰界入中種種分拆推求我不可得捨此自色像者譬如因樹則有樹影現若無樹者影由何生今五蘊尚從緣生都無自性何況此積集中而有我耶如上所説乃至證湛寂之心離一切過是於我之扼縛得穌息處若真言行者於瑜伽境界一切分段中能觀心不可得不生愛慢位與此齊也此中觀唯蘊無我時者謂聲聞聖位見修無學人觀我不可得證湛寂心時也此心相與真言行者於瑜伽境界能觀心不可得不留著心相分位齊也又第七卷疏釋五種三昧道中云復次辟支佛觀一切集法皆悉如涅槃相於種種有為境界中皆亦戲論風息不知所云故名證極滅語言三昧修瑜伽與此相應是名緣覺三昧也此二種三昧皆是菩提心難處然但是所行道中一種心相非謂不思議心性可有如是三乘定相是故行人以此法印自印知已便當直過無礙若不善識知則為所留礙也此中云修瑜伽與此相應者謂真言行者於瑜伽中心所證知有絶言處謂之相應名緣覺三昧二種三昧者謂聲聞緣覺二種三昧恐沈空滯寂故名菩提心難處也此中意云雖云真言行者心相名聲聞緣覺三昧非如三乘根性各別定相只是瑜伽中一種心相齊等彼心相故寄同名耳以此法印自印知者行者觀心不可得時及至言絶時知是聲聞緣覺三昧是謂此法印印者忍許決定義也印知了則不留著故云當直過無礙也又云經中佛説攝偈就五種三昧道中大分為二謂佛菩薩緣覺聲聞四種皆名出世間三昧若諸天等所説真言法教道皆屬世間三昧出世間三昧皆有實益故云摧害於諸過世間三昧但有權益故云為利衆生故也如餘經所説求小乘人當修行作觀即便於世間法教深生猒離求大乘人又於聲聞法教深生怖畏此皆為未知祕密藏者作此方便説耳就此經宗則五種三昧皆是開心實相門如行者初住有相瑜伽則是世間三昧但於此中了知唯蘊無我即是聲聞三昧若以十緣生句觀諸蘊無性無生即是菩薩三昧餘如住心品中廣明不同餘教以心性之旨未明故五乘殊轍不相融會也若更作深祕密釋者如三重漫荼羅中五位三昧皆是毗盧遮那祕密加持其與相應者皆可一生成佛何有淺深之殊今偈中所説就彼等自所流傳法教而言耳疏云攝偈者攝五種二昧而為二種謂世間出世間故云攝偈也此中初住有相瑜伽者謂行者初修三密供養作聲字觀及與本尊海會現前等皆是有相瑜伽即六無畏中第一第二無畏處是也次云但於此中了知唯蘊無我即是聲聞三昧者如前第三無我無畏釋真言行者於瑜伽境界一切分𫨻中觀心不可得與聲聞觀我不可得心相相應故瑜伽行者名聲聞三昧也次云若以十緣生句觀諸法無性無生即是菩薩三昧者謂證寂然界菩薩也疏釋第四法無畏云若害蘊住法攀緣當得法無畏者謂行者心住蘊中欲令發起離著爾時幻焰等喻觀察諸蘊即空得離違順八心證寂然界然離蘊之扼縛於法得穌息處法謂十緣生句也若真言行者現覺瑜伽境界皆如鏡像水月無性無生時位與此齊也次云餘如住心品中廣明者指三劫中第二劫以後四家大乘六無畏中第五第六二無畏也偈中所説者指前摧害於諸過及與為利衆生故二句有勝劣別故云就彼自所流傳法教若就此經宗皆可一生成佛無有淺深別故又第三疏釋第五法無我無畏云經云若害法住無緣當得法無我無畏者即是無緣乘心觀察法無我性於心外有無影像智都無所得心主自在覺本不生得離法之扼縛於法無我得穌息處若真言行者於瑜伽道中心得自在用時位與此齊也此合説他緣覺心二種隨應寄顯真言行者於瑜伽中心得自在用分位也又釋第六一切法自性平等無畏云經云若復一切蘊界處能執所執我壽命等及法無緣空自性無性此空智生當得一切法自性平等無畏者謂觀自心畢竟空性時乃至此空智生即是時極無自性心生也爾時於有為無為界二種扼縛得穌息處即是真言行者虛空無垢菩提心也此説極無兼含一道心顯真言行者虛空無垢菩提心也虛空無垢菩提心者超越三𡚶執而所證得淨菩提心以如上釋應知三劫六無畏處顯密寄齊相也得意融會則顯行心相與密心相同也三由欲令了知餘乘非究竟説者如九種住心無自性轉深轉妙皆是因偈顯此義也又寶鑰及住心論等一一住心引菩提心論釋摩訶衍論或云可厭患或云不可樂或云無明邊域非明分位者亦是也又三摩耶戒儀云異生羝羊凡夫專造十不善等業耽三毒五欲之樂不曾知後身墮三塗極苦是故真言有智人不可樂著愚童持齋人乘之法雖云漸信因果行五常五戒等猶是人中之因不得生天之樂是故不可樂著嬰童無畏外道生天之乘雖云下從四王天上至非想受二十八天樂終墮人中地獄等不得出生𣦸是故不可樂著唯蘊無我拔業因種二種羊鹿乘雖出三界猶是下劣三生六十之劫七八四百之時何其渺焉是故不可樂求他緣大乘覺心不生二種法門捨身命而行布施許妻子而與他人經三大阿僧祇行六度萬行劫石高廣難盡弱心易退難進十進九退吾亦何堪如實一道之心雖云拂心垢而入清淨泯境智而證如如猶是一道清淨之樂未入金剛之藏是故亦不可住極無自性心者雖云融法界而證三世間身等帝網而得一大法身猶是成佛之因初心之佛五相成身四種漫荼羅未能具足是故不可住未得為得未到謂到如是依如來教敕以最上智慧簡乘別發菩提心成佛之因初心之佛者如住心論鑰等云初發心時便成正覺宜其然也宜其然也者彼經所説尚不言究竟果位故也四由欲顯示顯乘極果任運流入淨菩提心海者經説第三劫云復次祕密主真言門修行菩薩行諸菩薩無量無數百千俱胝那庾多劫積集無量功德智慧具修諸行無量智慧方便皆悉成就天人世間之所歸依出過一切聲聞辟支佛地釋提桓因等親近敬禮所謂空性離於根境無相無境界越諸戲論等虛空無邊一切佛法依此相續生離有為無為界離諸造作離眼耳鼻舌身意極無自性心生祕密主如是初心佛説成佛因故於業煩惱解脫而業煩惱具依世間宗奉常應供養真言門者謂密乘初地淨菩提心空性極無同別一乘超第三劫任運入初地故疏釋此文云即是欲明超第三劫之心欲令見聞者信樂尊重故先歎其功德耳超第三劫之心者謂一道極無二種住心也又云若見此心明道時諸菩薩無數劫中所修福慧自然具足又云空性即是自心等虛空性上文無量如虛空乃至正等覺顯現即喻此心也無量如虛空乃至正等覺顯現者示淨菩提心相貌文也二種一乘入密初地者例如台教云別教妙覺入圓教第二行亦如香象云三乘極為佛而還入一乘具如後論之有人疑曰圓教一乘印度未流傳震旦始興佛説法時未流布之教緣何説之耶答圓教一乘者寧非華嚴法華等經乎何及疑哉況復如來境界非常情之得而所圖經云所謂越三時如來之日加持故身語意平等句法門實相圓明日無有過去未來之異故佛不思議力於一念中即攝前後同異劫海如是念念盡前後際促多劫一念延一念多劫延促自在咸適衆機況復諸教法過去諸佛已演説之現在諸佛今演説之未來諸佛當演説之故法華云我見燈明佛本光瑞如此以是知今佛欲説法華經況復如阿含云十二因緣法有佛無佛法位常住況復大乘圓教理乎況復佛神力影現未來之事於今日如心地觀説爾時如來於胸臆間放大光明影現如來不可思議八大塔其拘尸那國跋提河邊娑羅林中圓寂塔豈非未來之事乎菩提心心相義第四附心相顯密義菩提心者衆生固有一切智智其性常堅固者即是也雖生而相續無復敗壞從緣生故不生而生故無相之相生而不生故相常無相乃是所謂心之實相故疏一云心續生之相者雖此心畢竟常淨猶如虛空離一切相而亦從因緣起有心相生猶如大海波浪非是常有亦非常無若常有者不應風飇止息則澄然而靜若常無者不應風飇才起鼓怒相續當知是心從緣起故即是不生而生生而不生無相之相相常無相甚深微妙難可了知諸佛祕密之印不𡚶宣示此即所謂畢竟常淨菩提心也心諸相者心別相故疏云第四第五句云心諸相與時願佛廣開演者問此諸心別之相及相續勝進凡經幾時而得究竟淨菩提心也此第四句所謂諸心別相也問餘句所問菩提心相與第四句所問心相為同異耶答亦同亦異同者諸句所問心相與第四句心相皆是菩提心相貌彰於外者也故疏云第二句云復以云何相知發菩提心者相謂性成於內必有相彰於外如般若中廣明阿毗拔致相貌今此中亦問菩提心生時有何相貌也此豈非心相貌乎次亦異者諸句心相但是問淨菩提心相第四句心相普通一切善染汙心相如六十心有漏𡚶心故為簡去説之故疏二云然此六十心或時行者本性偏多或由行道用心發動先習或一時雜起或次第而生當於一切時留心覺察自然得順淨菩提心若阿闍梨為弟子平治心地時亦當一一簡去也以要言之第四句心相問心別相故偏取彼彰於外相諸句心相淨菩提心雖相彰於外以智眼觀之畢竟不生故畢竟無相云如來五眼尚不得其像貌所以為異故疏三云然此心在纏出纏皆畢竟無相以如來五眼諦觀尚不能得其像貌況餘生滅中人今所以廣明三劫六無畏處衆多心相者皆是擬儀外迹以明修證之深淺耳上已明見煙之相可以比知火性但知心垢盡處戲論不行即是第六無畏依更欲如何表示耶此中在纏出纏皆畢竟無相者雖此菩提心生而相續生而不生故菩提心性畢竟無相廣明心相者謂彰於外別行相因別行相知內證勝進擬儀外迹者此之謂也心垢盡處戲論不行者三𡚶已盡別行相息故名虛空無垢菩提心也更欲如何表示者謂若不依心別行相如何表示菩提心勝進乎就此心相及擬儀外迹覺苑意與大師相承顯教密行其旨不同覺苑意謂三劫六無畏所明觀行皆是真言行者所修故演密鈔三云疏學摩訶衍人至小乘見道等者謂學大乘之人初得出世初心即是越我倒粗𡚶執名出世初心此與小乘見道預流果適齊謂上之疏云如聲聞人初觀陰界入時即陰求我離陰求我皆不可得相在亦不可得爾時於八直道中遠塵離垢真法眼生真言門菩薩亦復如是初觀陰界入時即陰求心離陰求心皆不可得相在亦不可得即時懸悟自心本不生際於如來知見大菩提道中遠塵離垢得法眼淨故云與小乘見道適齊今言適齊者但相似名齊也此中以學摩訶衍人為真言行者寂然界已後諸大乘行相直為真言門菩薩所觀而以為真言行者觀門該統大小權實諸教若復分別顯密同異則鈔一云若對他教者如梵云劫跛餘教共譯為時分若度三阿僧祇時分即名成佛此中義別梵語劫跛譯為𡚶執𡚶執有三謂粗細極細此三𡚶執依五根本煩惱初分成十枝第二再分成二十種乃至第五分成一百六十隨煩惱數若依於此經發菩提心修密言行初以聚沫浮泡陽焰芭蕉幻事等五種譬喻觀無性空離百六十心一重粗𡚶執即超一阿僧祇劫復以幻陽焰影響旋火輪乾闥婆城六喻觀不可得空復越百六十心等一重細𡚶執即超二阿僧祇劫復以幻陽焰夢影乾城響水月浮泡虛空華旋火輪等十喻觀不思議空越百六十心一重極細𡚶執即超三僧祇劫行者若一生度此三𡚶執即一生成佛何論時分耶推此師意三劫六無畏所説觀行為真言行者瑜伽助修矣大師相承意如上具論寄齊顯教明真言行者外迹心相故學大乘人者謂湛寂菩薩也問學者一解廣明心相者指所寄齊顯教心相此義如何答非是也金剛手本問真言行者心相鐘谷之應何答顯人心相者乎寄齊顯教廣明真言門諸心相也問古德解謂心相與外迹其位殊也心相心形相外迹外事迹演密鈔云擬度外事之形迹以顯修證之淺深故外迹者謂顯行事迹心相者謂真言行者心形相也此義有以乎答此義不然內心無形相相彰于外名為心相亦云外事形迹故知外迹即心相今答真言行者心相何對真言行者內心指顯行稱外迹內心外用何為各別哉今疏證上文上文所明內心譬火性心相喻𤎆相一心上體相須繹上下例子細看焉上明者指六十心疏云祕密主彼云何貪心謂隨順染法者謂染著前境即是染汙淨心若隨順修行此法名有貪心以心法微細難識但觀彼所為事業必有相彰于外譬如鑑𤎆之狀貌則火性可以比知故諸句多以順修明義又下文云次偈過厺等正覺及與未來世現在諸世尊住饒益衆生如是諸賢者解真言妙法勤勇獲種智坐無相菩提者坐於諸法寂滅即是菩提非已成今成當成無法可觀不從他得當有何相耶此菩提不可説以示人故次偈更以外迹明之偈云真言勢無比能摧彼大力極忿怒魔軍釋師子救世者意言雖無定相而具一切威力能伏諸魔制諸外道開甘露門轉大法輪一切人天見如是迹故號為釋迦師子救世間者如見𤎆知火故當信受也此中意言雖世尊坐菩提無相故不可説示人然具威力能伏魔外是名外迹人天見外迹故當信受也亦是一人內心外迹豈為各別之譬喻乎故外迹者外用之迹也又上疏云如來自證之智設以神力加持亦不可示人前云奮迅示現無盡莊嚴藏者皆外用之迹耳智者見其條末則喻其宗本又云相謂性成於內必有相彰於外故應知外迹即心相也文所説行相雖顯人事迹得意會同則齊真言行者外迹故為真言行者外迹亦稱心相是寄齊説相也大日經劫心義章卷中編目湛寂寂然界義第五寂然界體法空義第六附斷二執義附觀二空義湛寂寂然界章段義第七兩種外道義第八寂然界攝屬義第九
