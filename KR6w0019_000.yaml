body:
  text: 大日經劫心義章序劫心者何謂三劫十住心也三劫十住心者何謂到祕密佛乘初地之中路險夷郵舍也凡學密乘有事相焉為教求者三劫十住心是為密家教相佛乘𭃡地名真言門而入真言門略有三事謂身語心平等䡄則也是名瑜伽事相事相𨐫如醫家祕方妙術故非靣付口授則不許輒行之以違越佛制速無間罪故所以事于師資相承焰焰相續也教相猶如醫家本草素問等經説藥性論病原故講者隨力得解翰牘述義所以教相趁眼之明昧而異議糾紛也舊來正眼者少僻釋者多衆總飄山聚成雷故學者滔滔執珉為玉豫心甚慨之憫念後進不忍韞默嘗著開奩編二卷繩愆糾謬然猶未罄纖旨膠執之徒不得通曉説之是重撰義章三卷以翼餘義云然豫年迫日索衰病轉侵氣懦不能開暢無玄微攬者冝察焉昔馬援暮齡再擊五溪蠻會暑甚中病輒曳以觀賊升險鼓譟其壯意可哀矣豫偶憶之歎息而已書之以為序貞享五戊辰春二月日瑞應七十五寒泊如運敞謹書于寂照堂大日經劫心義章卷上編目三劫義第一十住心義第二住心因由義第三附顯密寄齊義菩提心心相義第四附心相顯密義
